<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 관리 - Vaping Zone Review Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }
        .back-link:hover { background: rgba(255,255,255,0.3); }
        h1 {
            color: white;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            text-align: center;
            flex: 1;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s;
        }
        .tab:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .tab.active {
            background: white;
            color: #667eea;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .control-panel {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .control-panel h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 3fr;
            gap: 15px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            color: #666;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-download {
            background: #28a745;
            color: white;
        }
        .btn-download:hover { background: #218838; }
        .product-list {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            flex: 1;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        .search-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1em;
        }
        .product-table {
            width: 100%;
            border-collapse: collapse;
        }
        .product-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        .product-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        .product-table tr:hover { background: #f8f9fa; }
        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .btn-delete:hover { background: #c82333; }
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .alert.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-link">← 리뷰 생성기로 돌아가기</a>
            <h1>🛒 상품 관리</h1>
            <div style="width: 150px;"></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('vapingzone')">🔵 베이핑존</button>
            <button class="tab" onclick="switchTab('juiceon')">🟢 쥬스온</button>
            <button class="tab" onclick="switchTab('kukdae')">🟡 국대쥬스</button>
        </div>

        <!-- 베이핑존 -->
        <div id="vapingzone" class="tab-content active">
            <div class="alert" id="alert-vapingzone"></div>
            <div class="control-panel">
                <h2>➕ 상품 추가</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>상품번호*</label>
                        <input type="number" id="product_no_vapingzone" placeholder="예: 1001">
                    </div>
                    <div class="form-group">
                        <label>종류*</label>
                        <select id="category_vapingzone">
                            <option value="">선택</option>
                            <option value="액상">액상</option>
                            <option value="기기">기기</option>
                            <option value="일회용">일회용</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>상품명*</label>
                        <input type="text" id="name_vapingzone" placeholder="예: 미션 전자담배 킷">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-add" onclick="addProduct('vapingzone')">➕ 상품 추가</button>
                    <button class="btn btn-download" onclick="downloadExcel('vapingzone')">⬇️ 엑셀 다운로드</button>
                </div>
            </div>
            <div class="product-list">
                <h2>📦 상품 목록</h2>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="total_vapingzone">0</div>
                        <div class="stat-label">전체 상품</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="liquid_vapingzone">0</div>
                        <div class="stat-label">액상</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="device_vapingzone">0</div>
                        <div class="stat-label">기기</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="disposable_vapingzone">0</div>
                        <div class="stat-label">일회용</div>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" id="search_vapingzone" placeholder="🔍 상품 검색 (상품번호, 종류, 상품명)" onkeyup="searchProducts('vapingzone')">
                </div>
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>상품번호</th>
                            <th>종류</th>
                            <th>상품명</th>
                            <th>작업</th>
                        </tr>
                    </thead>
                    <tbody id="tbody_vapingzone"></tbody>
                </table>
            </div>
        </div>

        <!-- 쥬스온 -->
        <div id="juiceon" class="tab-content">
            <div class="alert" id="alert-juiceon"></div>
            <div class="control-panel">
                <h2>➕ 상품 추가</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>상품번호*</label>
                        <input type="number" id="product_no_juiceon" placeholder="예: 198">
                    </div>
                    <div class="form-group">
                        <label>종류*</label>
                        <select id="category_juiceon">
                            <option value="">선택</option>
                            <option value="액상">액상</option>
                            <option value="기기">기기</option>
                            <option value="일회용">일회용</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>상품명*</label>
                        <input type="text" id="name_juiceon" placeholder="예: 노보 멘솔 30ML">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-add" onclick="addProduct('juiceon')">➕ 상품 추가</button>
                    <button class="btn btn-download" onclick="downloadExcel('juiceon')">⬇️ 엑셀 다운로드</button>
                </div>
            </div>
            <div class="product-list">
                <h2>📦 상품 목록</h2>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="total_juiceon">0</div>
                        <div class="stat-label">전체 상품</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="liquid_juiceon">0</div>
                        <div class="stat-label">액상</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="device_juiceon">0</div>
                        <div class="stat-label">기기</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="disposable_juiceon">0</div>
                        <div class="stat-label">일회용</div>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" id="search_juiceon" placeholder="🔍 상품 검색 (상품번호, 종류, 상품명)" onkeyup="searchProducts('juiceon')">
                </div>
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>상품번호</th>
                            <th>종류</th>
                            <th>상품명</th>
                            <th>작업</th>
                        </tr>
                    </thead>
                    <tbody id="tbody_juiceon"></tbody>
                </table>
            </div>
        </div>

        <!-- 국대쥬스 -->
        <div id="kukdae" class="tab-content">
            <div class="alert" id="alert-kukdae"></div>
            <div class="control-panel">
                <h2>➕ 상품 추가</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>상품번호*</label>
                        <input type="number" id="product_no_kukdae" placeholder="예: 1001">
                    </div>
                    <div class="form-group">
                        <label>종류*</label>
                        <select id="category_kukdae">
                            <option value="">선택</option>
                            <option value="액상">액상</option>
                            <option value="기기">기기</option>
                            <option value="일회용">일회용</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>상품명*</label>
                        <input type="text" id="name_kukdae" placeholder="예: 미션 전자담배 킷">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-add" onclick="addProduct('kukdae')">➕ 상품 추가</button>
                    <button class="btn btn-download" onclick="downloadExcel('kukdae')">⬇️ 엑셀 다운로드</button>
                </div>
            </div>
            <div class="product-list">
                <h2>📦 상품 목록</h2>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="total_kukdae">0</div>
                        <div class="stat-label">전체 상품</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="liquid_kukdae">0</div>
                        <div class="stat-label">액상</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="device_kukdae">0</div>
                        <div class="stat-label">기기</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="disposable_kukdae">0</div>
                        <div class="stat-label">일회용</div>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" id="search_kukdae" placeholder="🔍 상품 검색 (상품번호, 종류, 상품명)" onkeyup="searchProducts('kukdae')">
                </div>
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>상품번호</th>
                            <th>종류</th>
                            <th>상품명</th>
                            <th>작업</th>
                        </tr>
                    </thead>
                    <tbody id="tbody_kukdae"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const productsData = { vapingzone: [], juiceon: [], kukdae: [] };

        window.onload = function() {
            loadProducts('vapingzone');
            loadProducts('juiceon');
            loadProducts('kukdae');
        };

        function switchTab(channel) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(channel).classList.add('active');
        }

        async function loadProducts(channel) {
            try {
                const res = await fetch(`/api/products/${channel}`);
                const data = await res.json();
                productsData[channel] = data.products;
                renderProducts(channel);
                updateStats(channel);
            } catch (e) {
                showAlert(channel, '데이터를 불러오는데 실패했습니다.', 'error');
            }
        }

        async function addProduct(channel) {
            const product_no = document.getElementById(`product_no_${channel}`).value;
            const category = document.getElementById(`category_${channel}`).value;
            const name = document.getElementById(`name_${channel}`).value;

            if (!product_no || !category || !name) {
                showAlert(channel, '모든 필드를 입력해주세요.', 'error');
                return;
            }

            try {
                const res = await fetch(`/api/products/${channel}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        product_no: parseInt(product_no), 
                        category, 
                        name 
                    })
                });

                if (res.ok) {
                    showAlert(channel, '상품이 추가되었습니다.', 'success');
                    loadProducts(channel);
                    document.getElementById(`product_no_${channel}`).value = '';
                    document.getElementById(`category_${channel}`).value = '';
                    document.getElementById(`name_${channel}`).value = '';
                } else {
                    const err = await res.json();
                    showAlert(channel, err.error, 'error');
                }
            } catch (e) {
                showAlert(channel, '추가에 실패했습니다.', 'error');
            }
        }

        async function deleteProduct(channel, product_no) {
            if (!confirm('정말 삭제하시겠습니까?')) return;

            try {
                const res = await fetch(`/api/products/${channel}/${product_no}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    showAlert(channel, '상품이 삭제되었습니다.', 'success');
                    loadProducts(channel);
                } else {
                    showAlert(channel, '삭제에 실패했습니다.', 'error');
                }
            } catch (e) {
                showAlert(channel, '삭제에 실패했습니다.', 'error');
            }
        }

        function renderProducts(channel, filteredData = null) {
            const tbody = document.getElementById(`tbody_${channel}`);
            const data = filteredData || productsData[channel];
            tbody.innerHTML = '';
            
            data.forEach(p => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${p.product_no}</td>
                    <td>${p.category}</td>
                    <td>${p.name}</td>
                    <td><button class="btn-delete" onclick="deleteProduct('${channel}', ${p.product_no})">🗑️ 삭제</button></td>
                `;
            });
        }

        function updateStats(channel) {
            const data = productsData[channel];
            const total = data.length;
            const liquid = data.filter(p => p.category === '액상').length;
            const device = data.filter(p => p.category === '기기').length;
            const disposable = data.filter(p => p.category === '일회용').length;

            document.getElementById(`total_${channel}`).textContent = total;
            document.getElementById(`liquid_${channel}`).textContent = liquid;
            document.getElementById(`device_${channel}`).textContent = device;
            document.getElementById(`disposable_${channel}`).textContent = disposable;
        }

        function searchProducts(channel) {
            const term = document.getElementById(`search_${channel}`).value.toLowerCase();
            const filtered = productsData[channel].filter(p =>
                p.product_no.toString().includes(term) ||
                p.category.toLowerCase().includes(term) ||
                p.name.toLowerCase().includes(term)
            );
            renderProducts(channel, filtered);
        }

        function showAlert(channel, msg, type) {
            const alert = document.getElementById(`alert-${channel}`);
            alert.textContent = msg;
            alert.className = `alert ${type} show`;
            setTimeout(() => alert.classList.remove('show'), 3000);
        }

        function downloadExcel(channel) {
            window.location.href = `/api/products/${channel}/download`;
        }
    </script>
</body>
</html>
